<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Rent Universe</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">
  <h2>Smart Rent</h2>

  <nav>
    <button onclick="goPage('home')">Home</button>
    <button onclick="goPage('listings')">Listings</button>
    <button onclick="goPage('post')">Post</button>
    <button onclick="toggleTheme()">🌙</button>
  </nav>
</header>

<section id="home" class="hero">
  <h1>Find Your Perfect Home or Shop</h1>
  <p>Direct owner contact | No middleman</p>

  <button onclick="goPage('listings')">Browse Listings</button>
  <button onclick="goPage('post')">Post Property</button>
</section>

<section id="listings" class="page" style="display:none;">
  <h2>Listings</h2>
  <div id="listingBox" class="grid"></div>
</section>

<section id="post" class="page" style="display:none;">
  <h2>Add Listing</h2>

  <input id="title" placeholder="Title">
  <input id="price" placeholder="Price">
  <input id="location" placeholder="Location">
  <input id="whatsapp" placeholder="WhatsApp">

  <button onclick="addListing()">Submit</button>
</section>

<footer>
  <p>WhatsApp: +923441695860</p>
  <p>EasyPaisa: +923441695860</p>
  <p>JazzCash: +923272358384</p>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
